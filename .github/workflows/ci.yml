name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (Django + pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pentesthub
          POSTGRES_PASSWORD: devpass
          POSTGRES_DB: pentesthub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pentesthub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: ci-secret-not-for-production
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: pentesthub
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: pentesthub
      REDIS_URL: redis://localhost:6379/0

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check for missing migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: uv run pytest -q

  web:
    name: Web (Next.js typecheck + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @pentesthub/web run typecheck

      - name: Build
        run: pnpm --filter @pentesthub/web run build
        env:
          NODE_ENV: production
