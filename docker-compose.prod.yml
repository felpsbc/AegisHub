# Stack de produção para deploy em um único host (VPS) com Docker.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Diferenças vs docker-compose.yml (dev):
#   - Backing services (postgres/redis/minio) NÃO expõem portas no host.
#   - API roda gunicorn como role pentesthub_app (RLS enforce), via entrypoint.
#   - Web roda o target `prod` (Next standalone), sem hot reload.
#   - Caddy faz TLS automático (Let's Encrypt) e é o único ponto exposto (80/443).
#   - Sem MailHog: e-mail vai para um SMTP real (EMAIL_HOST nas envs).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:?}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb -p local/${S3_BUCKET} || true;
      mc anonymous set none local/${S3_BUCKET};
      "

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      PYTHONUNBUFFERED: "1"
      DJANGO_DEBUG: "false"
      DJANGO_DB_USER: pentesthub_app
      # Postgres vive na rede docker privada deste host: tráfego não sai da
      # máquina. Para banco gerenciado externo (RDS), troque para 'require'.
      DJANGO_DB_SSLMODE: ${DJANGO_DB_SSLMODE:-disable}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # CMD default do Dockerfile = api-entrypoint.prod.sh (migrate + RLS + gunicorn).

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      PYTHONUNBUFFERED: "1"
      DJANGO_DEBUG: "false"
      DJANGO_DB_USER: pentesthub_app
      DJANGO_DB_SSLMODE: ${DJANGO_DB_SSLMODE:-disable}
    # api roda as migrations no boot; o worker só consome a fila.
    command: uv run celery -A pentesthub worker -l info --concurrency 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:8000
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: "${APP_DOMAIN:?defina o dominio publico do app}"
    volumes:
      - ./infra/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

volumes:
  postgres-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
